server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Cabeceras de seguridad ────────────────────────────────────────────────
    # Previene clickjacking: el frontend no puede cargarse en iframes externos.
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Previene MIME sniffing: el browser respeta el Content-Type declarado.
    add_header X-Content-Type-Options "nosniff" always;
    # Controla qué información envía el Referer en requests cross-origin.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # XSS filter legacy (IE/Edge < 79). Moderno: ya cubierto por CSP.
    add_header X-XSS-Protection "1; mode=block" always;
    # Permisions Policy: deshabilitar APIs de hardware no usadas.
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP: solo recursos del mismo origen + inline (Vite genera scripts inline).
    # Ampliar 'script-src' si se integran CDNs externos (Google Fonts, etc.).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'self';" always;

    # ── SPA routing ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy REST al backend .NET ────────────────────────────────────────────
    # BACKEND_INTERNAL_URL se sustituye por envsubst al arrancar el contenedor.
    # Docker-compose: http://backend:5000  |  Railway: http://backend.railway.internal:5000
    location /api/ {
        proxy_pass         ${BACKEND_INTERNAL_URL};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Proxy SignalR WebSocket al backend .NET ───────────────────────────────
    location /hubs/ {
        proxy_pass             ${BACKEND_INTERNAL_URL};
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_set_header       X-Real-IP  $remote_addr;
        proxy_cache_bypass     $http_upgrade;
        proxy_read_timeout     86400s;
    }

    # ── Archivos estáticos con caché larga ────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Necesario repetir aquí: add_header en bloque padre no hereda a location
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Ocultar versión de Nginx ──────────────────────────────────────────────
    server_tokens off;
}
